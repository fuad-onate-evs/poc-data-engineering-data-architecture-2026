# STUB — fleshed out in Sprint 4 (US-4.2).
# Triggers on PR to develop. Currently runs lint + smoke tests only.
# TODO Sprint 4: source validation, offline DQ, Kafka integration test.
name: ci-dev-qa
on:
  pull_request:
    branches: [develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pytest smoke tests
        run: uv run pytest tests/
      # TODO Sprint 4: source validation + offline DQ + Kafka integration test
