name: no-ai-attribution

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan changed files on PR
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          mapfile -t CHANGED < <(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}"...HEAD)
          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "No changed files."
            exit 0
          fi
          echo "Scanning ${#CHANGED[@]} changed files..."
          python scripts/hooks/check_no_ai_attribution.py "${CHANGED[@]}"

      - name: Scan commit messages on PR range
        run: |
          set -euo pipefail
          RANGE="origin/${{ github.base_ref }}..HEAD"
          git log --format=%B "$RANGE" \
            | python scripts/hooks/check_no_ai_attribution.py --stdin

      - name: Scan PR title and body
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          printf '%s\n%s\n' "$PR_TITLE" "$PR_BODY" \
            | python scripts/hooks/check_no_ai_attribution.py --stdin
