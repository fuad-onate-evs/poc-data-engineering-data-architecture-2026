repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.2.5
    hooks:
      - id: sqlfluff-fix
        files: \.sql$
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, chore, refactor, test, ci, build, perf]
  - repo: local
    hooks:
      - id: no-ai-attribution-content
        name: no ai attribution (tracked content)
        entry: python scripts/hooks/check_no_ai_attribution.py
        language: system
        pass_filenames: true
        stages: [pre-commit]
        types: [text]
      - id: no-ai-attribution-commit-msg
        name: no ai attribution (commit message)
        entry: python scripts/hooks/check_no_ai_attribution.py
        language: system
        pass_filenames: true
        stages: [commit-msg]
