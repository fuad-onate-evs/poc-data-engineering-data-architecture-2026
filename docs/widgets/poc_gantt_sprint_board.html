
<h2 class="sr-only">Gantt chart showing 6 epics across 5 sprints over 10 weeks for the POC Data Engineering Platform</h2>

<div style="padding: 0.5rem 0;">
  <div style="display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; font-size: 12px; color: var(--color-text-secondary);">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#534AB7"></span>DE1 (Lead)</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#1D9E75"></span>DE2</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#D85A30"></span>DE3</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#378ADD"></span>PM</span>
  </div>

  <div style="position:relative;width:100%;height:520px;">
    <canvas id="gantt" role="img" aria-label="Gantt chart: 6 epics across 10 weeks, 5 sprints">POC Gantt chart showing epic timeline distribution across 10 weeks.</canvas>
  </div>

  <div style="margin-top:20px;">
    <p style="font-size:14px;font-weight:500;color:var(--color-text-primary);margin:0 0 8px;">Sprint board / Tablero de sprints</p>
    <div id="board" style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const weeks = ['W1','W2','W3','W4','W5','W6','W7','W8','W9','W10'];

const epics = [
  { label: 'E1: Discovery & architecture', start: 0, end: 2, sp: 24, owners: ['DE1','DE2','DE3','PM'], color: '#534AB7' },
  { label: 'E2: Ingestion & Bronze', start: 2, end: 4, sp: 28, owners: ['DE1','DE2'], color: '#1D9E75' },
  { label: 'E3: Transformation Silver/Gold', start: 2, end: 8, sp: 38, owners: ['DE1','DE2','DE3'], color: '#D85A30' },
  { label: 'E4: Orchestration & CI/CD', start: 6, end: 8, sp: 24, owners: ['DE1','DE2','DE3'], color: '#378ADD' },
  { label: 'E5: Testing & quality', start: 8, end: 10, sp: 18, owners: ['DE2','DE3'], color: '#D4537E' },
  { label: 'E6: UAT & delivery', start: 8, end: 10, sp: 16, owners: ['DE1','PM','DE2','DE3'], color: '#639922' },
];

const datasets = epics.map((e, i) => ({
  label: e.label,
  data: [{ x: [e.start, e.end], y: i }],
  backgroundColor: e.color + 'CC',
  borderColor: e.color,
  borderWidth: 1,
  borderRadius: 4,
  borderSkipped: false,
  barPercentage: 0.7,
}));

new Chart(document.getElementById('gantt'), {
  type: 'bar',
  data: { labels: epics.map(e => e.label), datasets },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title: (items) => epics[items[0].dataIndex]?.label || '',
          label: (item) => {
            const e = epics[item.datasetIndex];
            return [`Weeks ${e.start+1}–${e.end} | ${e.sp} SP`, `Team: ${e.owners.join(', ')}`];
          }
        }
      }
    },
    scales: {
      x: {
        type: 'linear',
        min: 0, max: 10,
        ticks: {
          stepSize: 1,
          callback: (v) => weeks[v] || '',
          color: getComputedStyle(document.documentElement).getPropertyValue('--color-text-secondary').trim() || '#888',
        },
        grid: {
          color: 'rgba(128,128,128,0.12)',
        },
        title: { display: true, text: 'Weeks / Semanas', font: { size: 12 }, color: getComputedStyle(document.documentElement).getPropertyValue('--color-text-secondary').trim() || '#888' }
      },
      y: {
        ticks: {
          font: { size: 12 },
          color: getComputedStyle(document.documentElement).getPropertyValue('--color-text-primary').trim() || '#222',
        },
        grid: { display: false }
      }
    }
  }
});

const sprintOverlays = [
  { name: 'Sprint 1', w: 'W1–W2', epics: ['E1'], sp: 24 },
  { name: 'Sprint 2', w: 'W3–W4', epics: ['E2','E3'], sp: 28 },
  { name: 'Sprint 3', w: 'W5–W6', epics: ['E3'], sp: 27 },
  { name: 'Sprint 4', w: 'W7–W8', epics: ['E3','E4'], sp: 24 },
  { name: 'Sprint 5', w: 'W9–W10', epics: ['E5','E6'], sp: 34 },
];

const sprintColors = ['#534AB7','#1D9E75','#D85A30','#378ADD','#D4537E'];
const board = document.getElementById('board');
sprintOverlays.forEach((s, i) => {
  const col = sprintColors[i];
  board.innerHTML += `
    <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-top:3px solid ${col};border-radius:var(--border-radius-md);padding:10px 12px;">
      <div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px;">${s.name}</div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px;">${s.w} · ${s.sp} SP</div>
      ${s.epics.map(e => `<div style="font-size:11px;background:var(--color-background-secondary);border-radius:4px;padding:4px 6px;margin-bottom:3px;color:var(--color-text-primary);">${e}</div>`).join('')}
    </div>`;
});
</script>
